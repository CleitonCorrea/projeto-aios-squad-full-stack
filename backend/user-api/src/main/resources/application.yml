server:
  port: 8080

spring:
  application:
    name: user-api
  datasource:
    url: ${USER_DB_URL:jdbc:postgresql://localhost:5433/aiox_users}
    username: ${USER_DB_USERNAME:aiox_user}
    password: ${USER_DB_PASSWORD:local-user-db-password}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:aiox}
    password: ${RABBITMQ_PASSWORD:local-rabbitmq-password}

app:
  jwt:
    secret: ${JWT_SECRET:local-development-jwt-secret-change-before-any-shared-use}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  events:
    user-exchange: user.events
    user-created-routing-key: user.created

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
