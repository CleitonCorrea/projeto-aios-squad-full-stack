server:
  port: 8080

spring:
  application:
    name: product-api
  datasource:
    url: ${PRODUCT_DB_URL:jdbc:postgresql://localhost:5434/aiox_products}
    username: ${PRODUCT_DB_USERNAME:aiox_product}
    password: ${PRODUCT_DB_PASSWORD:local-product-db-password}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

app:
  jwt:
    secret: ${JWT_SECRET:local-development-jwt-secret-change-before-any-shared-use}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
