server:
  port: 8080

spring:
  application:
    name: notification-api
  datasource:
    url: ${NOTIFICATION_DB_URL:jdbc:postgresql://localhost:5435/aiox_notifications}
    username: ${NOTIFICATION_DB_USERNAME:aiox_notification}
    password: ${NOTIFICATION_DB_PASSWORD:local-notification-db-password}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:aiox}
    password: ${RABBITMQ_PASSWORD:local-rabbitmq-password}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

app:
  events:
    user-exchange: user.events
    user-created-routing-key: user.created
    user-created-queue: notification.user-created

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
