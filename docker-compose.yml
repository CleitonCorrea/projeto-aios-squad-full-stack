name: product-platform

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-productdb}
      POSTGRES_USER: ${POSTGRES_USER:-productuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-productpass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-productuser} -d ${POSTGRES_DB:-productdb}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app_net

  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
      RABBITMQ_PLUGINS: rabbitmq_prometheus
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
      - "${RABBITMQ_METRICS_PORT:-15692}:15692"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app_net
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: mailhog
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8025 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app_net

  identity-product-api:
    build:
      context: ${API_BUILD_CONTEXT:-./backend/identity-product-api}
      dockerfile: ${API_DOCKERFILE:-Dockerfile}
    container_name: identity-product-api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${API_PROFILE:-docker}
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-productdb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-productuser}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-productpass}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
      # ATENÇÃO: Defina APP_JWT_SECRET no arquivo .env antes de usar em produção
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS:-3600000}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 15
    networks:
      - app_net

  notification-service:
    build:
      context: ${NOTIFICATION_BUILD_CONTEXT:-./backend/notification-service}
      dockerfile: ${NOTIFICATION_DOCKERFILE:-Dockerfile}
    container_name: notification-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${NOTIFICATION_PROFILE:-docker}
      SERVER_PORT: 8081
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
    ports:
      - "${NOTIFICATION_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 15
    networks:
      - app_net

  frontend-app:
    build:
      context: ${FRONTEND_BUILD_CONTEXT:-./frontend}
      dockerfile: ${FRONTEND_DOCKERFILE:-Dockerfile}
    container_name: frontend-app
    depends_on:
      identity-product-api:
        condition: service_healthy
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 15
    networks:
      - app_net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    depends_on:
      identity-product-api:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - app_net

  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - app_net

volumes:
  postgres_data:
  rabbitmq_data:
  grafana_data:

networks:
  app_net:
    driver: bridge
