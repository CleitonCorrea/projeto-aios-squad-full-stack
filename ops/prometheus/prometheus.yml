global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "identity-product-api"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["identity-product-api:8080"]

  - job_name: "notification-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["notification-service:8081"]

  - job_name: "rabbitmq"
    metrics_path: /metrics
    static_configs:
      - targets: ["rabbitmq:15692"]
