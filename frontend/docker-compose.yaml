name: aiox-frontend

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL}
    container_name: aiox-frontend
    env_file:
      - ./.env
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - aiox-network

networks:
  aiox-network:
    external: true
    name: aiox-network
